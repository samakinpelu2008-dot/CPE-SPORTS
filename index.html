<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body{
            background-color: white;
            margin:0;
            padding-top:70px;
            font-family: 'Poppins', sans-serif;
        }

        /* BANNER */
        .banner{
            background: red;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-sizing: border-box;
        }

        .menu-icon {
            font-size: 40px;
            cursor: pointer;
            color:black;
        }

        .profile img{
            border-radius: 50px;
            object-fit:cover;
        }

        /* MENU */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: red;
            display: none;
            z-index: 3000;
        }

        .border-example {
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .line{
            border:1px solid white;
        }

        .close-btn {
            position: absolute;
            top: 16px;
            left: 15px;
            font-size: 20px;
            color: black;
            cursor: pointer;
        }

        .overlay-content {
            margin-top: 80px;
            padding-left: 20px;
        }

        .overlay-content a {
            display: block;
            color: white;
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
            text-decoration: none;
        }

        .space{
            height: 25px;
        }

        .image-post img{
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .post{
            background: red;
            padding: 15px;
        }

        .post-title{
            color: #FAA0A0;
            font-size: 16px;
            font-weight: bold;
            line-height:1.0;
        }

        .post-text{
            color: white;
            font-size: 30px;
            font-weight:bold;
            line-height:1.0;
        }

        /* NEWS SECTION */
        .news-item {
            display: flex;
            gap: 10px;
            padding: 12px 15px;
            margin: 10px 0;
            cursor: pointer;
            background: #ff0000; /* bright red */
            border-radius: 8px;
        }

        .news-item img {
            width: 100px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
        }

        .news-text {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .news-text h3 {
            font-size: 16px;
            color: white;
            margin: 0;
            line-height: 1.2;
        }

        .news-line {
            height: 1px;
            background: #ddd;
            margin: 10px 20px; /* space from edges */
        }

        /* Fixtures & Results */
        .fixture-box {
            background: #eee;
            margin: 15px;
            padding: 15px;
        }

        .fixture-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .match {
            text-align: center;
            margin: 15px 0;
        }

        .match img {
            width: 60px;
        }

        .teams {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .score-box {
            background: red;
            color: white;
            padding: 10px;
            font-size: 20px;
            margin: 0 10px;
            border-radius: 100px;
        }
    </style>
</head>

<!-- TOGGLE MENU SCRIPT -->
<script>
function toggleMenu() {
    const overlay = document.getElementById("overlay");
    overlay.style.display = (overlay.style.display === "block") ? "none" : "block";
}
</script>

<!-- FIREBASE + CONTENT LOADING -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCXEwNI2pRGtT_68xhTU7c5McUdz2HL8",
    authDomain: "cpe--football.firebaseapp.com",
    projectId: "cpe--football",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// MAIN POST
async function loadMainPost() {
    const snap = await getDoc(doc(db, "news", "main"));
    if (snap.exists()) {
        const data = snap.data();
        document.getElementById("imageContainer").innerHTML =
            `<div class="image-post"><img src="${data.image}"></div>`;
        document.getElementById("postContainer").innerHTML =
            `<div class="post">
                <div class="post-title">${data.title}</div>
                <div class="post-text">${data.text}</div>
            </div>`;
    }
}

// NEWS
async function loadHomepageNews() {
    const container = document.getElementById("newsContainer");
    container.innerHTML = "";
    for (let i = 1; i <= 5; i++) {
        const snap = await getDoc(doc(db, "homepageNews", String(i)));
        if (snap.exists()) {
            const data = snap.data();
            container.innerHTML += `
                <div class="news-item" onclick="openNews(${i})">
                    <img src="${data.image}">
                    <div class="news-text"><h3>${data.title}</h3></div>
                </div>
            `;
        }
    }
}
window.openNews = (id) => { window.location.href = "news.html?id=" + id; };

// FIXTURES
async function loadFixtures() {
    const container = document.getElementById("fixturesContainer");

    const nextSnap = await getDoc(doc(db, "fixtures", "next"));
    if (nextSnap.exists()) {
        const d = nextSnap.data();
        container.innerHTML += `
        <div class="fixture-box">
            <div class="fixture-header"><span>NEXT FIXTURE</span></div>
            <div class="match">
                <p>${d.date}</p>
                <p>${d.competition}</p>
                <div class="teams">
                    <div><img src="${d.team1Logo}"><p>${d.team1}</p></div>
                    <div><p>${d.time}</p></div>
                    <div><img src="${d.team2Logo}"><p>${d.team2}</p></div>
                </div>
            </div>
        </div>`;
    }

    const lastSnap = await getDoc(doc(db, "fixtures", "last"));
    if (lastSnap.exists()) {
        const d = lastSnap.data();
        container.innerHTML += `
        <div class="fixture-box">
            <div class="fixture-header"><span>LAST RESULT</span></div>
            <div class="match">
                <p>${d.date}</p>
                <p>${d.competition}</p>
                <div class="teams">
                    <p>${d.team1}</p>
                    <div class="score-box">${d.score1}</div>
                    <div class="score-box">${d.score2}</div>
                    <p>${d.team2}</p>
                </div>
            </div>
        </div>`;
    }
}

// LOAD ALL
loadMainPost();
loadHomepageNews();
loadFixtures();
</script>
